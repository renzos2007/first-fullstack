<main>
  <article>
    <section>
      <h1>
        {{ 'Betalen' | translate }}
      </h1>
      <p> {{ 'je.moet.betalen.1' | translate }} €{{ getTotalPrice() }} {{ 'je.moet.betalen.2' | translate }}</p>
    </section>

    <section>
      <h2>{{ 'betaalmethode' | translate }}</h2>
      <form (ngSubmit)="payPayment()">
        <div>
          <label>
            <input type="radio" name="chosenPaymentMethod" value="creditcard" [(ngModel)]="chosenPaymentMethod" required>
            Visa
          </label>
        </div>
        <div>
          <label>
            <input type="radio" name="chosenPaymentMethod" value="ideal" [(ngModel)]="chosenPaymentMethod" required>
            iDEAL
          </label>
        </div>
        <div>
          <label>
            <input type="radio" name="chosenPaymentMethod" value="paypal" [(ngModel)]="chosenPaymentMethod" required>
            PayPal
          </label>
        </div>
        <div>
          <label>
            <input type="radio" name="chosenPaymentMethod" value="mastercard" [(ngModel)]="chosenPaymentMethod" required>
            Mastercard
          </label>
        </div>
        <button type="submit">{{ 'betaal.bevestigen' | translate }}</button>
        <button type="button" (click)="cancelPayment()">{{ 'annuleren' | translate }}</button>
      </form>
    </section>

    <section id="error">
      @if (!paymentMethodChosen && !chosenPaymentMethod){
        <p>{{ 'betaal.error' | translate }}</p>
      }
    </section>
  </article>
</main>
