
<main>
  <section class="bestSeller">
    <button class="direction-left" (click)="previousBestSeller()"> < </button>
    <div class = "title-img">
      <h2 class="title">BESTSELLERS</h2>

      @if(bestSellers.length > 0){
        <a [routerLink]="['/product', bestSellers[index].productID]">
          <img [src]="bestSellers[index].image" alt="{{ 'afbeelding.van.bestseller' | translate }} {{bestSellers[index].name}}">
        </a>
      }
    </div>
    <button class="direction-right" (click)="nextBestSeller()"> > </button>
  </section>
  <section class="allProducts">
    <img src="/images/boeken.png" alt="Een set aan boeken">
    <div class="info">
      <button [routerLink]="['/difficulty']">{{ 'bekijk.alle.producten' | translate }}</button>
    </div>
  </section>
</main>
