@if (isAddingItem) {
  <app-add-winkelmand [product]="product" (cancel)="onCancelAddItem()"/>
}

<article [routerLink]="['/product/'+ getProductID()]">
  <a class="product-image">
    <img src="{{product.plaatje}}" alt="{{ 'afbeelding.van' | translate }} {{product.naam}}">
  </a>

  <a class="product-info">
    <h2 class="product-title">{{ product.naam }}</h2>
    <p class="product-author">{{ product.schrijver.voornaam }} {{ product.schrijver.tussenvoegsel }} {{ product.schrijver.achternaam }}</p>
    <p class="product-price">€{{ product.prijs }}</p>
    <a class="btn-buy" (click)="onStartAddItem($event)">{{ 'winkelwagen.toevoegen' | translate }}</a>
  </a>
</article>
